services:
  - type: web
    name: n8n
    runtime: image
    image:
      url: n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_HOST
        value: n8n.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_SECURE_COOKIE
        value: "false"
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
