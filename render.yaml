services:
  - type: web
    name: n8n
    runtime: image
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    plan: free
    envVars:
      - key: N8N_HOST
        value: your-service-name.onrender.com
      - key: WEBHOOK_URL
        value: https://your-service-name.onrender.com
      - key: N8N_PROTOCOL
        value: https
      # This helps prevent crashes on the free tier's limited memory
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
    image:
      url: n8nio/n8n:latest
